apiVersion: v1
kind: Namespace
metadata:
  name: gfs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gfs
  namespace: gfs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gfs
  namespace: gfs
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # Per-instance `{instance}-credentials` Secrets: the durable home of the
  # deploy-time database password (statefulset env resolves via secretKeyRef).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gfs
  namespace: gfs
subjects:
  - kind: ServiceAccount
    name: gfs
    namespace: gfs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gfs

