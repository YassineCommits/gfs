# Source database for the GFS clone demo.
#
# PostgreSQL 14 with the extensions the scenario requires. `app` is created as a
# superuser by the official image, so `CREATE EXTENSION` succeeds. pg_stat_statements
# is loaded as a shared library so its view actually returns rows.
services:
  source-db:
    image: postgres:14
    container_name: gfs-demo-source
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    ports:
      # Host 55432 -> container 5432. Reachable from GFS sidecars via
      # host.docker.internal:55432 (Docker Desktop on macOS/Windows).
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 30
